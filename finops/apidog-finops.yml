specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Apidog
providerId: apidog
publisherName: Apidog
serviceCategory: Developer Tools
created: '2026-05-04'
modified: '2026-05-22'
tags:
  - API Design
  - API Lifecycle
  - API Testing
  - Collaboration
  - Design-First
  - Documentation
  - Mocking
  - Platform
  - FinOps
  - Cost Management
  - FOCUS
description: >-
  FinOps framework definition for the Apidog platform. Apidog bills on a
  per-seat SaaS subscription model, not per-request, so the dominant FinOps
  signal is seat utilization and project / branch / scheduled-task
  entitlements per plan tier. This file captures that subscription billing
  model in FOCUS-aligned form.
sourceUrls:
  - https://apidog.com/pricing/
  - https://docs.apidog.com/overview-616932m0
principles:
  - name: Visibility
    description: Make Apidog seat assignments, plan tier, and feature usage visible to engineering managers and finance.
  - name: Allocation
    description: Tag each seat to a consuming team and project so cost can be allocated; reconcile against active-user counts.
  - name: Optimization
    description: Right-size seat count by reviewing actual usage, deactivating dormant accounts, and choosing the lowest tier that covers required entitlements.
  - name: Accountability
    description: Establish a single owner per Apidog organization who is accountable for seat growth, plan upgrades, and on-premises contracts.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly Or Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Apidog
  ServiceCategory: Developer Tools / API Platform
  ProviderName: Apidog
  PublisherName: Apidog
  InvoiceIssuerName: Apidog
  PricingCategory: Subscription
  PricingUnit: seat-month
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: seats
    description: Count of paid seats assigned to the Apidog organization
    unit: seat
    aggregation: sum
    dimensions:
      - tier
      - team
      - billingCycle
  - name: projects
    description: Number of Apidog projects in use vs. plan-included projects
    unit: project
    aggregation: sum
    dimensions:
      - tier
      - team
  - name: scheduled_tasks
    description: Number of active scheduled imports / tests
    unit: task
    aggregation: sum
    dimensions:
      - tier
      - team
  - name: mock_requests
    description: Calls made against Apidog cloud mock servers (utilization signal, not directly billed)
    unit: request
    aggregation: sum
    dimensions:
      - project
      - branch
apis:
  - name: Apidog
    baseURL: https://api.apidog.com
    tags:
      - API Design
      - API Lifecycle
      - Documentation
      - Import
      - Export
    serviceName: Apidog
    serviceCategory: Developer Tools
unitEconomics:
  - name: Cost per Active Seat
    metric: billed_cost / active_seats
    target: align to Basic ($9), Professional ($18), or Enterprise ($27) annual-billing seat rate
  - name: Seat Utilization
    metric: active_seats / purchased_seats
    target: '>= 0.80'
  - name: Cost per Project
    metric: billed_cost / projects_in_use
    target: TBD
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
