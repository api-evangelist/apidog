aid: apidog
url: https://raw.githubusercontent.com/api-evangelist/apidog/refs/heads/main/apis.yml
name: Apidog
description: >-
  Apidog is an all-in-one API development platform that connects the entire API
  lifecycle: visual API design, multi-protocol debugging (HTTP, REST, GraphQL,
  gRPC, WebSocket, SOAP, SSE), automated testing with a CLI, smart mocking,
  and published interactive documentation - all in a single collaborative
  workspace. As of 2026 Apidog also ships native MCP support: an apidog-mcp-server
  that feeds API specs to AI coding assistants (Cursor, VS Code + Cline) and
  an MCP Client inside the desktop app that visually debugs MCP servers over
  STDIO and Streamable HTTP with auto OAuth 2.0 configuration.
