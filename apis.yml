apis:
- aid: apidog:apidog
  name: Apidog
  description: >-
    Apidog's public REST API at https://api.apidog.com lets developers
    programmatically import API specifications into Apidog projects (OpenAPI 3,
    Swagger 2, Postman Collection v2) and export Apidog projects back out as
    OpenAPI 2.0, 3.0, or 3.1. The API is versioned via the X-Apidog-Api-Version
    header (current: 2024-03-28) and authenticated with a personal API access
    token sent as a Bearer Token.
