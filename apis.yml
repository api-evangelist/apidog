apis:
  - aid: apidog:apidog
    name: Apidog
    description: >-
      Apidog's public REST API allows developers to programmatically interact
      with Apidog projects for importing and exporting API specifications,
      managing endpoints, schemas, environments, and more. All API URLs begin
      with the base URL https://api.apidog.com. Authentication is via Bearer
      Token passed in the Authorization header.
    humanURL: https://apidog.com/
    baseURL: https://api.apidog.com
