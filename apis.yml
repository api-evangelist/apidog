name: Apidog
description: >-
  Apidog is a complete set of tools that connects the entire API lifecycle,
  helping R&D teams implement best practices for API Design-first development.
  It provides API design, debugging, testing, mocking, and documentation
  capabilities in a single collaborative platform with multi-protocol support
  including HTTP, GraphQL, gRPC, WebSocket, and SOAP.
