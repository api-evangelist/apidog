common:
- type: ArazzoWorkflows
  url: arazzo/
  workflows:
  - url: arazzo/apidog-backup-and-restore-project-workflow.yml
    name: Apidog Backup And Restore Project
    summary: Export a project as a backup document, then branch to restore it into a recovery project only when the export succeeds.
  - url: arazzo/apidog-consolidate-sources-into-project-workflow.yml
    name: Apidog Consolidate Sources Into One Project
    summary: Import an OpenAPI spec and a Postman Collection into one project, then export the merged result.
  - url: arazzo/apidog-convert-postman-to-openapi-workflow.yml
    name: Apidog Convert Postman Collection To OpenAPI
    summary: Import a Postman Collection into Apidog and export it back out as OpenAPI.
  - url: arazzo/apidog-downgrade-oas-version-workflow.yml
    name: Apidog Downgrade OpenAPI Version
    summary: Import a modern OpenAPI spec into a project and re-export it at an older OpenAPI version.
  - url: arazzo/apidog-dual-format-export-archive-workflow.yml
    name: Apidog Dual-Format Export Archive
    summary: Export the same project once as JSON and once as YAML to produce a two-format archive.
  - url: arazzo/apidog-import-from-url-and-verify-workflow.yml
    name: Apidog Import Spec From URL And Verify
    summary: Import an OpenAPI spec from a remote URL into a project, then export it back to verify.
  - url: arazzo/apidog-migrate-spec-between-projects-workflow.yml
    name: Apidog Migrate Spec Between Projects
    summary: Export the API specification from one Apidog project and import it into another.
  - url: arazzo/apidog-promote-spec-between-branches-workflow.yml
    name: Apidog Promote Spec Between Branches
    summary: Export a spec from one sprint branch and import it into another branch of the same project.
  - url: arazzo/apidog-sync-module-across-projects-workflow.yml
    name: Apidog Sync Module Across Projects
    summary: Export a specific module from one project and import it into a module of another project.
