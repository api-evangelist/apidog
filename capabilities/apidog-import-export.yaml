naftiko: 1.0.0-alpha2
info:
  label: Apidog API - Import And Export
  description: >-
    Apidog API - Import And Export. 3 operations across the import/export
    surface: import OpenAPI/Swagger, export OpenAPI/Swagger, and import Postman
    Collection v2. Self-contained Naftiko capability covering Apidog's public
    REST API as documented at https://openapi.apidog.io/.
  tags:
  - Apidog
  - Import And Export
  - API Design
  - API Lifecycle
  created: '2026-05-19'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    APIDOG_API_KEY: APIDOG_API_KEY
    APIDOG_API_VERSION: APIDOG_API_VERSION
capability:
  consumes:
  - type: http
    namespace: apidog-import-export
    baseUri: https://api.apidog.com
    description: Apidog API - Import And Export business capability. Self-contained, no shared references.
    resources:
    - name: v1-projects-projectId-export-openapi
      path: /v1/projects/{projectId}/export-openapi
      operations:
      - name: exportOpenApiData
        method: POST
        description: Export Data In OpenAPI Or Swagger Format
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: integer
          required: true
        - name: X-Apidog-Api-Version
          in: header
          type: string
          required: true
          default: '2024-03-28'
        - name: body
          in: body
          type: object
          description: Request body (JSON) with scope, oasVersion, exportFormat, etc.
          required: false
    - name: v1-projects-projectId-import-openapi
      path: /v1/projects/{projectId}/import-openapi
      operations:
      - name: importOpenApiData
        method: POST
        description: Import OpenAPI Or Swagger Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: integer
          required: true
        - name: X-Apidog-Api-Version
          in: header
          type: string
          required: true
          default: '2024-03-28'
        - name: body
          in: body
          type: object
          description: Request body (JSON) with input (spec/url) and options.
          required: true
    - name: v1-projects-projectId-import-postman-collection
      path: /v1/projects/{projectId}/import-postman-collection
      operations:
      - name: importPostmanCollectionData
        method: POST
        description: Import Postman Collection Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: integer
          required: true
        - name: X-Apidog-Api-Version
          in: header
          type: string
          required: true
          default: '2024-03-28'
        - name: body
          in: body
          type: object
          description: Request body (JSON) with input (stringified collection) and options.
          required: true
    authentication:
      type: bearer
      token: '{{env.APIDOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: apidog-import-export-rest
    port: 8080
    description: REST adapter for Apidog API - Import And Export. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/projects/{projectId}/export-openapi
      name: v1-projects-projectId-export-openapi
      description: REST surface for exporting an Apidog project as an OpenAPI document.
      operations:
      - method: POST
        name: exportOpenApiData
        description: Export Data In OpenAPI Or Swagger Format
        call: apidog-import-export.exportOpenApiData
        with:
          projectId: rest.path.projectId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{projectId}/import-openapi
      name: v1-projects-projectId-import-openapi
      description: REST surface for importing OpenAPI/Swagger into an Apidog project.
      operations:
      - method: POST
        name: importOpenApiData
        description: Import OpenAPI Or Swagger Data
        call: apidog-import-export.importOpenApiData
        with:
          projectId: rest.path.projectId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{projectId}/import-postman-collection
      name: v1-projects-projectId-import-postman-collection
      description: REST surface for importing a Postman Collection into an Apidog project.
      operations:
      - method: POST
        name: importPostmanCollectionData
        description: Import Postman Collection Data
        call: apidog-import-export.importPostmanCollectionData
        with:
          projectId: rest.path.projectId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: apidog-import-export-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apidog API - Import And Export. One tool per consumed operation; complements Apidog's own apidog-mcp-server which exposes API spec reads to AI coding assistants.
    tools:
    - name: apidog-export-openapi
      description: Export an Apidog project as an OpenAPI 2.0, 3.0, or 3.1 document.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apidog-import-export.exportOpenApiData
      with:
        projectId: tools.projectId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apidog-import-openapi
      description: Import an OpenAPI or Swagger document into an Apidog project.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: apidog-import-export.importOpenApiData
      with:
        projectId: tools.projectId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apidog-import-postman-collection
      description: Import a Postman Collection v2 into an Apidog project.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: apidog-import-export.importPostmanCollectionData
      with:
        projectId: tools.projectId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
