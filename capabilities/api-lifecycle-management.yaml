naftiko: "1.0.0-alpha1"

info:
  label: "Apidog API Lifecycle Management"
  description: "Unified workflow for managing API specifications lifecycle with Apidog - importing from various sources, exporting to standard formats, and maintaining API definitions programmatically."
  tags:
    - Apidog
    - API Lifecycle
    - API Design
    - Import
    - Export
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      APIDOG_BEARER_TOKEN: APIDOG_BEARER_TOKEN

capability:
  consumes:
    - import: apidog
      location: ./shared/apidog.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: apidog-lifecycle-api
      description: "Unified REST API for Apidog API lifecycle management."
      resources:
        - path: /v1/specs/import
          name: spec-import
          description: "Import API specifications from various formats."
          operations:
            - method: POST
              name: import-openapi
              description: "Import OpenAPI specification into Apidog project."
              call: "apidog.import-openapi"
              with:
                projectId: "rest.projectId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/specs/export
          name: spec-export
          description: "Export API specifications to standard formats."
          operations:
            - method: POST
              name: export-openapi
              description: "Export OpenAPI specification from Apidog project."
              call: "apidog.export-openapi"
              with:
                projectId: "rest.projectId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: apidog-lifecycle-mcp
      transport: http
      description: "MCP server for AI-assisted Apidog API lifecycle management."
      tools:
        - name: import-openapi-spec
          description: "Import an OpenAPI/Swagger specification into an Apidog project for design-first development."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "apidog.import-openapi"
          with:
            projectId: "tools.projectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: export-openapi-spec
          description: "Export an OpenAPI specification from an Apidog project for sharing or CI/CD integration."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "apidog.export-openapi"
          with:
            projectId: "tools.projectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: import-postman-collection
          description: "Import a Postman collection into Apidog for converting to OpenAPI-based workflows."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "apidog.import-postman"
          with:
            projectId: "tools.projectId"
          outputParameters:
            - type: object
              mapping: "$."
